name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ap-hp-bq-test
  REGION: asia-northeast1
  SERVICE_NAME: markebase

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/markebase/${SERVICE_NAME}:${{ github.sha }} \
            -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/markebase/${SERVICE_NAME}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/markebase/${SERVICE_NAME}:${{ github.sha }}
          docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/markebase/${SERVICE_NAME}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/markebase/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3

      - name: Show deployment URL
        run: |
          echo "Deployed to: https://${SERVICE_NAME}-${PROJECT_NUMBER}.${REGION}.run.app"
        env:
          PROJECT_NUMBER: "238415407415"
